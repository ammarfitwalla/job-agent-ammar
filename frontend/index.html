<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Job Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="text-slate-800 min-h-screen">

  <!-- ── Header ── -->
  <header id="mainHeader" style="background: linear-gradient(135deg, #1e1b4b 0%, #3730a3 45%, #6d28d9 100%); border-bottom: 1px solid rgba(255,255,255,0.08);">
    <div class="max-w-screen-2xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-base font-bold text-white"
          style="background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18); backdrop-filter: blur(8px);">J</div>
        <div>
          <h1 class="text-xl font-bold tracking-tight text-white">AI Job Agent</h1>
          <p class="text-xs tracking-widest uppercase" style="color: rgba(199,210,254,0.7); letter-spacing: 0.12em; font-size: 10px;">Scrape &middot; Score &middot; Apply</p>
        </div>
      </div>
      <div class="hidden sm:flex items-center gap-2 text-xs rounded-full px-4 py-2"
        style="background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.14); backdrop-filter: blur(8px); color: rgba(199,210,254,0.9);">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 inline-block" style="box-shadow: 0 0 6px #34d399;"></span>
        <span id="resultCount">0</span>&nbsp;jobs found
      </div>
    </div>
  </header>

  <main class="max-w-screen-2xl mx-auto p-4 sm:p-6">
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-5">

      <!-- ===== LEFT PANEL ===== -->
      <div class="lg:col-span-2 space-y-4">

        <!-- Resume -->
        <div class="panel-card">
          <div class="flex items-center gap-2 mb-3">
            <div class="sec-icon">
              <svg class="w-3.5 h-3.5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
            </div>
            <label class="font-semibold text-sm text-slate-700">Resume <span class="text-red-400">*</span></label>
          </div>
          <div class="flex gap-2 mb-2.5">
            <label for="fileInput"
              class="flex-1 flex items-center justify-center gap-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 py-2 rounded-xl text-sm font-semibold cursor-pointer transition">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5-5m0 0l5 5m-5-5v12"/></svg>
              <span id="uploadLabel">Upload Resume</span>
            </label>
            <input id="fileInput" type="file" accept=".pdf,.docx,.txt" class="hidden">
          </div>
          <textarea id="resume" rows="8"
            class="w-full border border-slate-200 rounded-xl p-3 text-sm font-mono bg-slate-50 focus:bg-white outline-none"
            placeholder="Upload a resume or paste text here..."></textarea>
          <div class="mt-2.5 flex gap-2">
            <button id="extractBtn"
              class="flex-1 w-full text-white py-2 rounded-xl text-sm font-semibold disabled:opacity-40 disabled:cursor-not-allowed disabled:shadow-none">
              Extract Keywords
            </button>
          </div>
        </div>

        <!-- Keywords -->
        <div class="panel-card">
          <div class="flex items-center gap-2 mb-3">
            <div class="sec-icon">
              <svg class="w-3.5 h-3.5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
              </svg>
            </div>
            <label class="font-semibold text-sm text-slate-700">Keywords</label>
            <span class="text-xs text-slate-500 ml-auto bg-slate-100 px-2 py-0.5 rounded-full font-medium" id="kwCount">0 selected</span>
          </div>
          <div id="keywords" class="flex flex-wrap gap-1.5 min-h-[32px]">
            <span class="text-xs text-slate-400 italic">Paste a resume and click Extract Keywords</span>
          </div>
          <div class="mt-3 flex gap-2">
            <input id="customKeywordInput" type="text"
              class="flex-1 border border-slate-200 rounded-lg px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 transition"
              placeholder="Add custom keyword...">
            <button id="addKeywordBtn"
              class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded-lg text-sm font-semibold">+ Add</button>
          </div>
          <div id="customKeywords" class="mt-2 flex flex-wrap gap-1.5"></div>
        </div>

        <!-- Roles -->
        <div class="panel-card">
          <div class="flex items-center gap-2 mb-3">
            <div class="sec-icon">
              <svg class="w-3.5 h-3.5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </div>
            <label class="font-semibold text-sm text-slate-700">Job Roles <span class="text-red-400">*</span></label>
            <span class="text-xs text-slate-500 ml-auto bg-slate-100 px-2 py-0.5 rounded-full font-medium" id="roleCount">0 selected</span>
          </div>
          <div id="roles" class="space-y-1 max-h-56 overflow-y-auto pr-0.5"></div>
          <div class="mt-3 flex gap-2">
            <input id="customRoleInput" type="text"
              class="flex-1 border border-slate-200 rounded-lg px-3 py-1.5 text-sm outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 transition"
              placeholder="Add custom role...">
            <button id="addRoleBtn"
              class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded-lg text-sm font-semibold">+ Add</button>
          </div>
          <div id="customRoles" class="mt-2 flex flex-wrap gap-1.5"></div>
        </div>

      </div>

      <!-- ===== RIGHT PANEL ===== -->
      <div class="lg:col-span-3 space-y-4">

        <!-- Location -->
        <div class="panel-card">
          <div class="flex items-center gap-2 mb-3">
            <div class="sec-icon">
              <svg class="w-3.5 h-3.5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            </div>
            <label class="font-semibold text-sm text-slate-700">Location <span class="text-red-400">*</span></label>
          </div>
          <div class="relative">
            <input id="locationInput" type="text" autocomplete="off"
              class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm bg-white text-slate-700 outline-none focus:ring-2 focus:ring-indigo-200 transition"
              placeholder="Search state or region...">
            <div id="locationResults" class="hidden absolute top-full left-0 right-0 z-20 mt-1 bg-white border border-slate-200 rounded-xl shadow-xl max-h-48 overflow-y-auto"></div>
            <div id="selectedLocation" class="hidden mt-1.5 flex items-center gap-1.5 text-xs text-emerald-700 bg-emerald-50 px-2.5 py-1 rounded-lg"></div>
          </div>
        </div>

        <!-- Sites -->
        <div class="panel-card">
          <div class="flex items-center gap-2 mb-3">
            <div class="sec-icon">
              <svg class="w-3.5 h-3.5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
            <label class="font-semibold text-sm text-slate-700">Sites <span class="text-red-400">*</span></label>
          </div>
          <div id="sites" class="flex flex-wrap gap-2">
            <label class="flex items-center gap-1.5 bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full cursor-pointer hover:bg-indigo-100 transition text-xs font-semibold border border-indigo-100">
              <input type="checkbox" value="adzuna" class="accent-indigo-600">
              <span>Adzuna</span>
            </label>
            <label class="flex items-center gap-1.5 bg-blue-50 text-blue-700 px-3 py-1.5 rounded-full cursor-pointer hover:bg-blue-100 transition text-xs font-semibold border border-blue-100">
              <input type="checkbox" value="linkedin" class="accent-blue-600">
              <span>LinkedIn</span>
            </label>
            <label class="flex items-center gap-1.5 bg-sky-50 text-sky-700 px-3 py-1.5 rounded-full cursor-pointer hover:bg-sky-100 transition text-xs font-semibold border border-sky-100">
              <input type="checkbox" value="indeed" checked class="accent-sky-600">
              <span>Indeed</span>
            </label>
            <label class="flex items-center gap-1.5 bg-slate-50 text-slate-400 px-3 py-1.5 rounded-full cursor-not-allowed text-xs border border-slate-200">
              <input type="checkbox" value="remoteok" disabled class="accent-slate-300">
              <span>RemoteOK</span><span class="soon-badge ml-1">SOON</span>
            </label>
            <label class="flex items-center gap-1.5 bg-slate-50 text-slate-400 px-3 py-1.5 rounded-full cursor-not-allowed text-xs border border-slate-200">
              <input type="checkbox" value="weworkremotely" disabled class="accent-slate-300">
              <span>WeWorkRemotely</span><span class="soon-badge ml-1">SOON</span>
            </label>
            <label class="flex items-center gap-1.5 bg-slate-50 text-slate-400 px-3 py-1.5 rounded-full cursor-not-allowed text-xs border border-slate-200">
              <input type="checkbox" value="naukri" disabled class="accent-slate-300">
              <span>Naukri</span><span class="soon-badge ml-1">SOON</span>
            </label>
            <label class="flex items-center gap-1.5 bg-slate-50 text-slate-400 px-3 py-1.5 rounded-full cursor-not-allowed text-xs border border-slate-200">
              <input type="checkbox" value="gulftalent" disabled class="accent-slate-300">
              <span>GulfTalent</span><span class="soon-badge ml-1">SOON</span>
            </label>
            <label class="flex items-center gap-1.5 bg-slate-50 text-slate-400 px-3 py-1.5 rounded-full cursor-not-allowed text-xs border border-slate-200">
              <input type="checkbox" value="eurojobs" disabled class="accent-slate-300">
              <span>EuroJobs</span><span class="soon-badge ml-1">SOON</span>
            </label>
          </div>
        </div>

        <!-- Internship Mode Toggle -->
        <div id="internshipPanel" class="panel-card" style="background: #f0fdf4; border-color: #bbf7d0;">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2 min-w-0">
              <span class="text-base">🎓</span>
              <div class="min-w-0">
                <label class="font-semibold text-sm text-slate-700">Internship Mode</label>
                <p class="text-xs text-slate-400 truncate">Only intern & entry-level jobs</p>
              </div>
            </div>
            <button id="internshipToggle"
              class="relative w-11 h-6 rounded-full transition shrink-0 ml-3"
              style="background: #cbd5e1;">
              <span id="toggleKnob" class="absolute top-0.5 left-0.5 w-5 h-5 rounded-full bg-white shadow transition"></span>
            </button>
          </div>

        </div>

        <!-- Search button (moved below Sites) -->
        <div class="flex gap-2">
          <button id="searchBtn"
            class="flex-1 text-white py-3 rounded-xl font-semibold disabled:opacity-40 disabled:cursor-not-allowed disabled:shadow-none flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            Search Jobs
          </button>
        </div>
        <div class="bg-white rounded-2xl border border-slate-200 min-h-[500px] flex flex-col overflow-hidden"
          style="box-shadow: 0 1px 4px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.04);">

          <!-- Status bar -->
          <div id="status" class="hidden px-5 py-3 text-sm border-b border-slate-100 flex items-center gap-2"></div>

          <!-- Filter bar -->
          <div id="filterBar" class="hidden px-5 py-2.5 border-b border-slate-100 flex flex-wrap items-center gap-1.5 text-xs"></div>

          <!-- Spinner / Skeleton -->
          <div id="spinner" class="hidden flex flex-col p-5 text-slate-400">
            <div class="space-y-3">
              <div class="skeleton-card"><div class="skeleton-line w-3/5"></div><div class="skeleton-line w-2/5"></div></div>
              <div class="skeleton-card"><div class="skeleton-line w-1/2"></div><div class="skeleton-line w-3/5"></div></div>
              <div class="skeleton-card"><div class="skeleton-line w-2/3"></div><div class="skeleton-line w-1/3"></div></div>
            </div>
            <div class="flex items-center justify-center gap-2 mt-6 text-sm font-medium text-slate-400">
              <svg class="spin-inner w-4 h-4 text-indigo-400" fill="none" viewBox="0 0 24 24">
                <path fill="currentColor" opacity="0.8" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
              <span id="spinnerMsg">Processing...</span>
            </div>
          </div>

          <!-- Results -->
          <div id="results" class="flex-1 p-5 space-y-3 overflow-y-auto">
            <div class="flex flex-col items-center justify-center py-24 text-slate-300">
              <div class="w-16 h-16 rounded-2xl bg-slate-50 border border-slate-100 flex items-center justify-center mb-4">
                <svg class="w-7 h-7 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
              </div>
              <p class="text-sm font-medium text-slate-400">Results will appear here</p>
              <p class="text-xs text-slate-300 mt-1">Select keywords + roles and search</p>
            </div>
          </div>

        </div>
      </div>

    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
