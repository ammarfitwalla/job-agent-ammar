<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Job Agent</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: #f8fafc; /* slate-50 */
    color: #0f172a; /* slate-900 */
    -webkit-font-smoothing: antialiased;
  }
  
  @import url('/style.css');

  /* Custom Select Dropdown Arrow */
  .status-select {
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 0.5rem center;
    background-size: 1em;
    padding-right: 2rem !important;
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* Smooth reveal animation */
  .fade-in { animation: fadeIn 0.3s ease-out forwards; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body class="min-h-screen pb-12">

<!-- Header -->
<header class="glass-header sticky top-0 z-50 transition-colors duration-300" id="mainHeader">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
    <a href="/" class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-slate-900 text-white flex items-center justify-center font-bold text-sm shadow-sm transition-colors duration-300">JA</div>
      <div>
        <h1 class="text-base font-semibold tracking-tight text-slate-900 leading-tight">AI Job Agent</h1>
        <p class="text-[11px] text-slate-500 leading-tight mt-0.5">Find jobs where you actually have a shot.</p>
      </div>
    </a>
    <div class="flex items-center gap-3">
      <a href="/" class="text-sm font-medium text-slate-500 hover:text-indigo-600 transition-colors flex items-center gap-1.5">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Back to Search
      </a>
      <button id="logoutBtn" onclick="logout()" class="hidden text-sm font-medium text-slate-500 hover:text-red-500 transition-colors flex items-center gap-1.5">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Log Out
      </button>
      <a href="/profile.html" class="w-9 h-9 rounded-full flex items-center justify-center text-slate-600 hover:text-indigo-500 hover:bg-indigo-50 bg-slate-100 border-2 border-slate-300 hover:border-indigo-200 transition-all" id="profileLink" title="Your Profile">
        <svg class="w-[20px] h-[20px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
      </a>
    </div>
  </div>
</header>

<!-- Main Content -->
<main class="max-w-4xl mx-auto px-4 sm:px-6 pt-8" id="pageContent">
  
  <!-- Auth Prompt -->
  <div id="authPrompt" class="hidden fade-in max-w-lg mx-auto mt-20 sm:mt-28 bg-white rounded-3xl p-10 shadow-lg border border-slate-200/80 text-center">
    <div class="w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-500 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-lg shadow-indigo-500/20">
      <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
    </div>
    <h2 class="text-2xl font-bold text-slate-900 mb-3">Sign in to your profile</h2>
    <p class="text-sm text-slate-500 mb-10 leading-relaxed max-w-sm mx-auto">Enter your email to save jobs, track applications, and manage everything across sessions.</p>
    
    <div class="space-y-4">
      <div class="flex flex-col sm:flex-row gap-3">
        <input id="promptEmail" type="email" placeholder="name@example.com" class="flex-1 border border-slate-200 rounded-xl px-5 py-3.5 text-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all placeholder:text-slate-400 bg-slate-50 focus:bg-white">
        <button id="promptSendBtn" onclick="promptSendCode()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3.5 rounded-xl text-sm font-semibold transition-all shadow-sm hover:shadow-lg active:scale-95 whitespace-nowrap flex items-center gap-2">
          <span id="promptSendText">Send Code</span>
          <svg id="promptSendSpinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
        </button>
      </div>
      <p id="promptError" class="hidden text-sm text-red-600 bg-red-50 rounded-xl px-4 py-3 font-medium border border-red-100"></p>
    </div>
  </div>

  <!-- Profile View -->
  <div id="profileContent" class="hidden fade-in space-y-8">
    
    <!-- Profile Card -->
    <div class="bg-white rounded-2xl p-6 sm:p-8 shadow-sm border border-slate-200/60 flex flex-col sm:flex-row items-start sm:items-center gap-6">
      <div class="w-20 h-20 rounded-2xl bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-3xl font-bold text-white shadow-inner flex-shrink-0" id="avatarLetter">U</div>
      
      <div class="flex-1 min-w-0">
        <div id="nameDisplay" class="group flex items-center gap-3">
          <h2 id="nameText" class="text-2xl font-bold text-slate-900 truncate"></h2>
          <button class="text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 p-1.5 rounded-lg transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100" onclick="enableNameEdit()" title="Edit name">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/></svg>
          </button>
        </div>
        
        <div id="nameEdit" class="hidden my-1">
          <div class="flex items-center gap-2">
            <input id="nameInput" type="text" maxlength="50" class="text-2xl font-bold text-slate-900 bg-slate-50 border border-slate-300 rounded-lg px-3 py-1 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 w-full max-w-xs transition-all">
            <button onclick="saveName()" class="bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">Save</button>
            <button onclick="disableNameEdit()" class="text-slate-400 hover:text-slate-600 bg-slate-100 hover:bg-slate-200 p-2 rounded-lg transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
        </div>
        
        <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-4 mt-1">
          <div class="text-slate-500 flex items-center gap-1.5 text-sm">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <span id="emailDisplay"></span>
          </div>
          <span class="hidden sm:inline text-slate-300">•</span>
          <div class="text-slate-400 text-sm flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <span id="joinedDate"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Job Tracking Section -->
    <div class="space-y-4">
      <div class="flex items-center justify-between border-b border-slate-200 pb-2">
        <h3 class="text-lg font-bold text-slate-900">Saved Jobs</h3>
      </div>
      
      <!-- Tabs -->
      <div class="flex gap-2 overflow-x-auto pb-2 -mx-4 px-4 sm:mx-0 sm:px-0 hide-scrollbar" id="statusTabs"></div>

      <!-- Job List -->
      <div id="jobList" class="space-y-3"></div>
    </div>
  </div>
</main>

<!-- Auth Modal -->
<div id="authModal" class="hidden fixed inset-0 z-50 items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 transition-opacity" onclick="if (event.target===this) closeAuthModal()">
  <div class="bg-white rounded-2xl p-8 shadow-2xl w-full max-w-sm mx-auto transform transition-all fade-in" onclick="event.stopPropagation()">
    <div id="authStep1">
      <div class="flex items-start justify-between mb-4">
        <div>
          <h3 class="text-xl font-bold text-slate-900">Enter Verification Code</h3>
          <p class="text-sm text-slate-500 mt-1">Sent to <span id="modalEmail" class="font-medium text-slate-700"></span></p>
        </div>
        <button onclick="closeAuthModal()" class="text-slate-400 hover:text-slate-600 bg-slate-50 hover:bg-slate-100 p-2 rounded-full transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      
      <div class="flex gap-2 justify-between mt-6 mb-2" id="codeInputs">
        <input class="code-digit w-12 h-14 text-center text-xl font-bold border-2 border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 transition-all bg-slate-50 focus:bg-white" maxlength="1" data-idx="0" autofocus>
        <input class="code-digit w-12 h-14 text-center text-xl font-bold border-2 border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 transition-all bg-slate-50 focus:bg-white" maxlength="1" data-idx="1">
        <input class="code-digit w-12 h-14 text-center text-xl font-bold border-2 border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 transition-all bg-slate-50 focus:bg-white" maxlength="1" data-idx="2">
        <input class="code-digit w-12 h-14 text-center text-xl font-bold border-2 border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 transition-all bg-slate-50 focus:bg-white" maxlength="1" data-idx="3">
        <input class="code-digit w-12 h-14 text-center text-xl font-bold border-2 border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 transition-all bg-slate-50 focus:bg-white" maxlength="1" data-idx="4">
        <input class="code-digit w-12 h-14 text-center text-xl font-bold border-2 border-slate-200 rounded-xl outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 transition-all bg-slate-50 focus:bg-white" maxlength="1" data-idx="5">
      </div>
      
      <p id="authCodeError" class="hidden text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2 text-center font-medium my-4 border border-red-100"></p>
      
      <button onclick="verifyCode()" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-3.5 rounded-xl text-sm font-semibold transition-all shadow-sm hover:shadow-md active:scale-95 mt-6">
        Verify & Sign In
      </button>
    </div>
  </div>
</div>

<script>
function getProfile() {
  try {
    const raw = localStorage.getItem("jobagent_profile");
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function setProfile(data) {
  localStorage.setItem("jobagent_profile", JSON.stringify(data));
}
function clearProfile() {
  localStorage.removeItem("jobagent_profile");
}

function updateNavIcon() {
  const link = document.getElementById("profileLink");
  const profile = getProfile();
  link.classList.remove("bg-indigo-50", "border-indigo-200", "hover:bg-indigo-100",
    "text-slate-600", "hover:text-indigo-500", "hover:bg-indigo-50", "bg-slate-100", "border-2", "border-slate-300", "hover:border-indigo-200");
  if (profile) {
    link.innerHTML = `<span class="w-[20px] h-[20px] rounded-full bg-indigo-500 text-white flex items-center justify-center text-[11px] font-bold leading-none" style="line-height:0">${profile.name.charAt(0).toUpperCase()}</span>`;
    link.classList.add("bg-indigo-50", "border-indigo-200", "hover:bg-indigo-100");
    link.title = profile.name;
  } else {
    link.innerHTML = '<svg class="w-[20px] h-[20px]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>';
    link.classList.add("text-slate-600", "hover:text-indigo-500", "hover:bg-indigo-50", "bg-slate-100", "border-2", "border-slate-300", "hover:border-indigo-200");
    link.title = "Your Profile";
  }
}

function logout() {
  if (!confirm("Log out? You'll need to verify your email again to access your saved jobs.")) return;
  clearProfile();
  window.location.href = "/";
}

let _authEmail = "";
let allSavedJobs = [];

function showToast(msg) {
  const existing = document.getElementById('toast-msg');
  if(existing) existing.remove();

  const el = document.createElement("div");
  el.id = 'toast-msg';
  el.className = "fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-slate-900 text-white text-sm font-medium px-5 py-3 rounded-full shadow-xl flex items-center gap-2 fade-in";
  el.innerHTML = `<svg class="w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg> ${msg}`;
  document.body.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translate(-50%, 10px)';
    el.style.transition = 'all 0.3s ease';
    setTimeout(() => el.remove(), 300);
  }, 2500);
}

// ── Auth ──
function promptSendCode() {
  const email = document.getElementById("promptEmail").value.trim();
  const errEl = document.getElementById("promptError");
  const btn = document.getElementById("promptSendBtn");
  const text = document.getElementById("promptSendText");
  const spinner = document.getElementById("promptSendSpinner");
  if (!email || !email.includes("@")) {
    errEl.textContent = "Please enter a valid email address.";
    errEl.classList.remove("hidden");
    return;
  }
  errEl.classList.add("hidden");
  btn.disabled = true;
  text.textContent = "Sending";
  spinner.classList.remove("hidden");
  _authEmail = email;
  fetch("/api/auth/send-code", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email }),
  }).then(r => r.json()).then(d => {
    if (d.ok) {
      document.getElementById("modalEmail").textContent = email;
      document.getElementById("authModal").style.display = "flex";
      document.querySelectorAll(".code-digit").forEach(inp => { inp.value = ""; });
      setTimeout(() => document.querySelector(".code-digit").focus(), 100);
    } else {
      errEl.textContent = d.error || "Failed to send code.";
      errEl.classList.remove("hidden");
    }
    btn.disabled = false;
    text.textContent = "Send Code";
    spinner.classList.add("hidden");
  }).catch(() => {
    errEl.textContent = "Network error. Please try again.";
    errEl.classList.remove("hidden");
    btn.disabled = false;
    text.textContent = "Send Code";
    spinner.classList.add("hidden");
  });
}

function closeAuthModal() {
  document.getElementById("authModal").style.display = "none";
}

function verifyCode() {
  const digits = document.querySelectorAll("#authModal .code-digit");
  const code = Array.from(digits).map(d => d.value).join("");
  const errEl = document.getElementById("authCodeError");
  if (code.length !== 6) { errEl.textContent = "Please enter the full 6-digit code."; errEl.classList.remove("hidden"); return; }
  errEl.classList.add("hidden");
  fetch("/api/auth/verify-code", {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email: _authEmail, code }),
  }).then(r => r.json()).then(d => {
    if (d.ok) {
      setProfile({ email: d.user.email, name: d.user.name });
      closeAuthModal();
      loadProfile();
      showToast("Successfully signed in");
    } else {
      errEl.textContent = d.error || "Invalid code provided.";
      errEl.classList.remove("hidden");
    }
  }).catch(() => {
    errEl.textContent = "Network error. Please try again.";
    errEl.classList.remove("hidden");
  });
}

// Setup code inputs
document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll("#authModal .code-digit").forEach(inp => {
    inp.addEventListener("input", function() {
      if (this.value && this.dataset.idx < "5") {
        const next = document.querySelector(`#authModal .code-digit[data-idx="${parseInt(this.dataset.idx)+1}"]`);
        if (next) next.focus();
      }
    });
    inp.addEventListener("keydown", function(e) {
      if ((e.key === "Backspace" || e.key === "Backward") && !this.value && this.dataset.idx > "0") {
        const prev = document.querySelector(`#authModal .code-digit[data-idx="${parseInt(this.dataset.idx)-1}"]`);
        if (prev) { prev.focus(); prev.value = ""; }
      }
      if (e.key === "Enter") verifyCode();
    });
    inp.addEventListener("paste", function(e) {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData("text").replace(/\D/g, "");
      if (text.length !== 6) return;
      const inputs = document.querySelectorAll("#authModal .code-digit");
      inputs.forEach((input, i) => { input.value = text[i] || ""; });
      inputs[5].focus();
    });
  });
  updateNavIcon();
  loadProfile();
});

// ── Profile ──
async function loadProfile() {
  const profile = getProfile();
  const logoutBtn = document.getElementById("logoutBtn");
  if (!profile) {
    document.getElementById("authPrompt").classList.remove("hidden");
    document.getElementById("profileContent").classList.add("hidden");
    logoutBtn.classList.add("hidden");
    updateNavIcon();
    setTimeout(() => document.getElementById("promptEmail").focus(), 100);
    return;
  }
  logoutBtn.classList.remove("hidden");
  updateNavIcon();
  document.getElementById("authPrompt").classList.add("hidden");
  document.getElementById("profileContent").classList.remove("hidden");

  try {
    const r = await fetch(`/api/profile?email=${encodeURIComponent(profile.email)}`);
    const d = await r.json();
    if (d.error) { showToast(d.error); return; }
    renderProfile(d);
  } catch { 
    // Show mock profile visually if api fails for demo purposes
    renderProfile({
      name: profile.name || "User",
      email: profile.email,
      created_at: new Date().toISOString(),
      status_counts: { total: 0 }
    });
  }
}

function renderProfile(data) {
  document.getElementById("nameText").textContent = data.name;
  document.getElementById("emailDisplay").textContent = data.email;
  const d = new Date(data.created_at);
  document.getElementById("joinedDate").textContent = "Member since " + d.toLocaleDateString("en-US", { year: "numeric", month: "long" });
  document.getElementById("avatarLetter").textContent = data.name.charAt(0).toUpperCase();
  renderStatusTabs(data.status_counts || {});
  loadSavedJobs();
}

function enableNameEdit() {
  document.getElementById("nameDisplay").classList.add("hidden");
  document.getElementById("nameDisplay").classList.remove("flex");
  document.getElementById("nameEdit").classList.remove("hidden");
  document.getElementById("nameInput").value = document.getElementById("nameText").textContent;
  document.getElementById("nameInput").focus();
}
function disableNameEdit() {
  document.getElementById("nameDisplay").classList.remove("hidden");
  document.getElementById("nameDisplay").classList.add("flex");
  document.getElementById("nameEdit").classList.add("hidden");
}
async function saveName() {
  const profile = getProfile();
  if (!profile) return;
  const name = document.getElementById("nameInput").value.trim();
  if (!name) return;
  try {
    const r = await fetch("/api/profile/name", {
      method: "PUT", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email: profile.email, name }),
    });
    const d = await r.json();
    if (d.ok) {
      profile.name = name;
      setProfile(profile);
      document.getElementById("nameText").textContent = name;
      document.getElementById("avatarLetter").textContent = name.charAt(0).toUpperCase();
      disableNameEdit();
      showToast("Name updated successfully");
    }
  } catch { 
    // Mock success if api fails for UI purposes
    profile.name = name;
    setProfile(profile);
    document.getElementById("nameText").textContent = name;
    document.getElementById("avatarLetter").textContent = name.charAt(0).toUpperCase();
    disableNameEdit();
    showToast("Name updated successfully");
  }
}

function renderStatusTabs(counts) {
  const all = ["saved", "applied", "interviewing", "offer", "rejected"];
  const labels = { saved: "Saved", applied: "Applied", interviewing: "Interviewing", offer: "Offer", rejected: "Rejected" };
  const el = document.getElementById("statusTabs");
  
  const getTabClass = (isActive) => isActive 
    ? "bg-slate-900 text-white shadow-md border-transparent" 
    : "bg-white text-slate-600 border-slate-200 hover:bg-slate-50 hover:border-slate-300";

  const getCountClass = (isActive) => isActive ? "bg-white/20 text-white" : "bg-slate-100 text-slate-500";

  let html = `<button class="tab-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 border flex items-center gap-2 whitespace-nowrap ${getTabClass(!_filterStatus)}" onclick="filterJobs('')">
    All <span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${getCountClass(!_filterStatus)}">${counts.total || 0}</span>
  </button>`;
  
  for (const s of all) {
    if ((counts[s] || 0) > 0 || _filterStatus === s) {
      const isActive = _filterStatus === s;
      html += `<button class="tab-btn px-4 py-2 rounded-full text-sm font-medium transition-all duration-200 border flex items-center gap-2 whitespace-nowrap ${getTabClass(isActive)}" data-status="${s}" onclick="filterJobs('${s}')">
        ${labels[s]} <span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${getCountClass(isActive)}">${counts[s] || 0}</span>
      </button>`;
    }
  }
  el.innerHTML = html;
}

let _filterStatus = "";

function filterJobs(status) {
  _filterStatus = status;
  // Re-render tabs to update styles based on active status
  const counts = allSavedJobs.reduce((acc, job) => {
    const s = job.application_status || "saved";
    acc[s] = (acc[s] || 0) + 1;
    acc.total = (acc.total || 0) + 1;
    return acc;
  }, {total: 0});
  renderStatusTabs(counts);
  renderJobList();
}

async function loadSavedJobs() {
  const profile = getProfile();
  if (!profile) return;
  try {
    const r = await fetch(`/api/saved-jobs?email=${encodeURIComponent(profile.email)}`);
    const d = await r.json();
    allSavedJobs = d.jobs || [];
    filterJobs(_filterStatus); // renders both tabs and list correctly calculated
  } catch {
    // Mock empty state if API fails
    allSavedJobs = [];
    filterJobs(_filterStatus);
  }
}

function renderJobList() {
  const jobs = _filterStatus ? allSavedJobs.filter(j => (j.application_status || 'saved') === _filterStatus) : allSavedJobs;
  const el = document.getElementById("jobList");
  if (!jobs.length) {
    el.innerHTML = `
      <div class="text-center py-16 px-4 bg-white rounded-2xl border border-slate-200 border-dashed">
        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z"/></svg>
        </div>
        <h3 class="text-slate-900 font-medium mb-1">${_filterStatus ? `No ${_filterStatus} jobs found` : "No saved jobs yet"}</h3>
        <p class="text-slate-500 text-sm">When you bookmark jobs, they will appear here.</p>
      </div>`;
    return;
  }

  const getStatusStyles = (status) => {
    switch(status) {
      case 'applied': return 'bg-blue-50 text-blue-700 border-blue-200 focus:ring-blue-500/20';
      case 'interviewing': return 'bg-amber-50 text-amber-700 border-amber-200 focus:ring-amber-500/20';
      case 'offer': return 'bg-emerald-50 text-emerald-700 border-emerald-200 focus:ring-emerald-500/20';
      case 'rejected': return 'bg-red-50 text-red-700 border-red-200 focus:ring-red-500/20';
      default: return 'bg-slate-100 text-slate-700 border-slate-200 focus:ring-slate-500/20';
    }
  };

  el.innerHTML = jobs.map(j => {
    const status = j.application_status || "saved";
    const statusClass = getStatusStyles(status);
    const savedDate = j.saved_at ? new Date(j.saved_at).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "";
    const tags = (j.tags || []).slice(0, 3);
    
    return `
    <div class="group bg-white p-4 sm:p-5 rounded-2xl border border-slate-200/60 hover:shadow-md hover:border-indigo-200 transition-all duration-300 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
      <div class="flex-1 min-w-0">
        <a href="${j.url}" target="_blank" class="text-base sm:text-lg font-bold text-slate-900 hover:text-indigo-600 transition-colors truncate block">
          ${j.title || "Untitled Position"}
        </a>
        <div class="flex flex-wrap items-center gap-2 sm:gap-3 text-sm text-slate-500 mt-1 mb-3">
          <span class="font-medium text-slate-700 flex items-center gap-1">
            <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            ${j.company || "Unknown Company"}
          </span>
          ${j.location ? `<span class="flex items-center gap-1"><svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>${j.location}</span>` : ""}
          ${j.total_score ? `<span class="font-semibold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded text-xs flex items-center gap-1"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>${j.total_score}/100</span>` : ""}
        </div>
        <div class="flex flex-wrap items-center gap-2">
          ${tags.map(t => `<span class="text-xs font-medium bg-slate-100 text-slate-600 px-2.5 py-1 rounded-md border border-slate-200/60">${t}</span>`).join("")}
          ${savedDate ? `<span class="text-xs text-slate-400 sm:ml-auto flex items-center gap-1"><svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Saved ${savedDate}</span>` : ""}
        </div>
      </div>
      
      <div class="flex sm:flex-col items-center sm:items-end justify-between sm:justify-center gap-3 sm:border-l sm:border-slate-100 sm:pl-5 sm:ml-2 flex-shrink-0">
        <select class="status-select outline-none border px-3 py-2 rounded-xl text-sm font-semibold transition-all focus:ring-2 cursor-pointer ${statusClass}" onchange="updateStatus(${j.id}, this.value)">
          <option value="saved" ${status==="saved"?"selected":""}>Saved</option>
          <option value="applied" ${status==="applied"?"selected":""}>Applied</option>
          <option value="interviewing" ${status==="interviewing"?"selected":""}>Interviewing</option>
          <option value="offer" ${status==="offer"?"selected":""}>Offer</option>
          <option value="rejected" ${status==="rejected"?"selected":""}>Rejected</option>
        </select>
        
        <button class="flex items-center gap-1.5 text-xs font-medium text-slate-400 hover:text-red-600 hover:bg-red-50 px-2 py-1.5 rounded-lg transition-all opacity-100 sm:opacity-0 group-hover:opacity-100 focus:opacity-100" onclick="removeJob(${j.id})" title="Remove from saved jobs">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          <span class="sm:hidden">Remove</span>
        </button>
      </div>
    </div>`;
  }).join("");
}

async function updateStatus(jobId, status) {
  try {
    const r = await fetch(`/api/saved-jobs/${jobId}/status`, {
      method: "PATCH", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ status }),
    });
    const d = await r.json();
    if (d.ok) {
      const job = allSavedJobs.find(j => j.id === jobId);
      if (job) job.application_status = status;
      filterJobs(_filterStatus); // update UI
      showToast("Application status updated");
    }
  } catch { 
    // Mock UI update if api fails
    const job = allSavedJobs.find(j => j.id === jobId);
    if (job) job.application_status = status;
    filterJobs(_filterStatus);
    showToast("Application status updated");
  }
}

async function removeJob(jobId) {
  try {
    const r = await fetch(`/api/saved-jobs/${jobId}`, { method: "DELETE" });
    const d = await r.json();
    if (d.deleted) {
      allSavedJobs = allSavedJobs.filter(j => j.id !== jobId);
      filterJobs(_filterStatus);
      showToast("Job removed from saved list");
    }
  } catch { 
    // Mock UI removal if api fails
    allSavedJobs = allSavedJobs.filter(j => j.id !== jobId);
    filterJobs(_filterStatus);
    showToast("Job removed from saved list");
  }
}
</script>
